version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ticket-db
    environment:
      POSTGRES_DB: ticketdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ticketdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  write-service:
    build: .
    container_name: ticket-write-container
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=write
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ticketdb
    depends_on:
      db:
        condition: service_healthy
    restart: always

  read-service:
    build: .
    container_name: ticket-read-container
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=read
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ticketdb
    depends_on:
      db:
        condition: service_healthy
    restart: always
